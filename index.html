<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: white;
            text-align: center;
        }
        header {
            padding: 20px;
        }
        .content {
            margin: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }
        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Our Beautiful Website</h1>
    </header>
    <div class="content">
        <h2>Content Generator</h2>
        <button onclick="generateContent()">Generate Content</button>
        <div id="generatedContent"></div>
        <script>
            function generateContent() {
                const content = 'Here is the dynamically generated content!';
                document.getElementById('generatedContent').innerText = content;
            }
        </script>

        <h2>Telegram Bot Integration</h2>
        <p>Contact our bot: <a href="https://t.me/yourbot">@yourbot</a></p>

        <h2>Cryptocurrency Payment System</h2>
        <p>We accept Bitcoin and Ethereum payments.</p>
        <h3>Pricing Plans</h3>
        <ul>
            <li>Basic Plan: $10 per month</li>
            <li>Pro Plan: $20 per month</li>
        </ul>
    </div>
    <footer>
        <p>© 2026 Your Company Name</p>
    </footer>
</body>
</html>
