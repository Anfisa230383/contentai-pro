<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentAI Pro - Social Media Content Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>ContentAI Pro</h1>
        <p>Your ultimate social media content generator with full multilingual support.</p>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Features</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="content-generator">
            <h2>Generate Your Content</h2>
            <label for="language-select">Choose Language:</label>
            <select id="language-select">
                <option value="en">English</option>
                <option value="ru">Russian</option>
                <option value="uz">Uzbek</option>
            </select>
            <textarea id="content-input" placeholder="Enter your topic here..."></textarea>
            <button id="generate-btn">Generate Content</button>
            <div id="output"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 ContentAI Pro. All rights reserved.</p>
    </footer>
</body>
</html>
